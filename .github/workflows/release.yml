name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.run_number) || github.ref_name }}
          releaseName: ${{ github.event_name == 'workflow_dispatch' && format('XG221B manual build {0}', github.run_number) || format('XG221B {0}', github.ref_name) }}
          releaseBody: |
            XG221B is a lightweight local-first desktop notes app.

            See CHANGELOG.md for details.
          releaseDraft: true
          prerelease: false
