name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Verify tag matches version
        run: node scripts/check-versions.mjs ${{ github.ref_name }}
      - run: npm run qa
      - run: npm run build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: XG221B ${{ github.ref_name }}
          releaseBody: |
            XG221B is a lightweight local-first desktop notes app.

            See docs/CHANGELOG.md for details.
          releaseDraft: false
          prerelease: false
